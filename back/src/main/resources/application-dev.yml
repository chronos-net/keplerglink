server:
  port: 8081
  address: 0.0.0.0

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5438/kepler}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:CHANGE_ME}
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      max-file-size: 400MB
      max-request-size: 400MB

  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: none  # o update / create-drop segÃºn tu necesidad

  jwt:
    secret: ${JWT_SECRET:CHANGE_ME}
    expiration-ms: 1800000

batch:
  jdbc:
    initialize-schema: always

app:
  springdoc:
    api-doc:
      path: /api/docs-json
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: DEBUG
    com.edomex.kiliantRSP: DEBUG
